<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOKMAXING</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#00c8ff;--cyan:#00ffe7;--fire:#ff6a00;--gold:#ffd700;
  --glass:rgba(255,255,255,0.055);--border:rgba(255,255,255,0.09);
  --border-blue:rgba(0,200,255,0.22);
}

/* ═══ BACKGROUND ═══ */
#bg-img{
  position:fixed;inset:-20px;
  background:url('fundo.png') center top/cover no-repeat;
  animation:bgPulse 8s ease-in-out infinite;z-index:-2;
}
@keyframes bgPulse{
  0%,100%{transform:scale(1.06) translate(0,0);filter:blur(4px);}
  33%{transform:scale(1.07) translate(-3px,2px);filter:blur(5px);}
  66%{transform:scale(1.06) translate(3px,-2px);filter:blur(4px);}
}
body::after{
  content:'';position:fixed;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,0.83) 0%,rgba(0,0,0,0.67) 50%,rgba(0,0,0,0.88) 100%);
  z-index:-1;
}
#bg-video{
  display:none;position:fixed;top:50%;left:50%;
  min-width:100%;min-height:100%;width:auto;height:auto;
  transform:translate(-50%,-50%);object-fit:cover;z-index:-2;
}

/* ═══ INTRO ═══ */
#intro{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#000 0%,#040b12 55%,#001828 100%);
  transition:opacity 0.9s ease,visibility 0.9s;
}
#intro::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,200,255,0.013) 2px,rgba(0,200,255,0.013) 4px);
  pointer-events:none;
}
#intro.hide{opacity:0;visibility:hidden;pointer-events:none;}

.intro-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(54px,16vw,96px);
  letter-spacing:12px;text-align:center;line-height:1;
  background:linear-gradient(90deg,#fff 20%,var(--blue) 55%,var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:logoGlow 2s ease-in-out infinite alternate;
}
@keyframes logoGlow{
  from{filter:drop-shadow(0 0 6px rgba(0,200,255,0.35));}
  to{filter:drop-shadow(0 0 30px rgba(0,220,255,0.9));}
}
.intro-sub{
  font-family:'Rajdhani',sans-serif;font-size:12px;
  letter-spacing:7px;color:rgba(255,255,255,0.28);
  text-transform:uppercase;margin-top:6px;margin-bottom:50px;
}
.load-wrap{width:260px;text-align:center;}
.load-label{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:10px;}
.load-track{width:100%;height:2px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;}
.load-fill{height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width 0.04s linear;box-shadow:0 0 12px var(--cyan);}
.load-pct{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--cyan);letter-spacing:3px;margin-top:14px;}
.load-status{font-family:'Rajdhani',sans-serif;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-top:5px;min-height:14px;}

/* ═══ BODY ═══ */
body{
  min-height:100vh;color:white;display:flex;justify-content:center;
  padding:20px 16px 90px;font-family:'Rajdhani',sans-serif;overflow-x:hidden;
}
.app{width:100%;max-width:480px;z-index:1;opacity:0;transition:opacity 0.7s ease;}
.app.visible{opacity:1;}

/* ═══ HEADER ═══ */
.header{
  margin-bottom:12px;background:var(--glass);backdrop-filter:blur(18px);
  border:1px solid var(--border-blue);border-radius:22px;padding:20px 22px;
  position:relative;overflow:hidden;
  animation:fadeUp 0.5s ease 0.1s both;
}
.header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.5;
}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.header h1{
  font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:7px;
  background:linear-gradient(90deg,#fff 30%,var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;
}
.data-badge{
  font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.38);
  background:rgba(255,255,255,0.06);border:1px solid var(--border);
  border-radius:20px;padding:5px 10px;white-space:nowrap;text-transform:uppercase;
  font-family:'Rajdhani',sans-serif;
}
.progress-label{font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,0.28);text-transform:uppercase;margin-bottom:7px;}
.progress-container{background:rgba(255,255,255,0.07);border-radius:20px;height:5px;overflow:hidden;}
.progress{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  transition:width 0.5s cubic-bezier(.4,0,.2,1);border-radius:20px;
  box-shadow:0 0 10px rgba(0,200,255,0.45);
}
.percent{margin-top:7px;font-size:11px;color:var(--cyan);letter-spacing:1.5px;}

/* ═══ STATS GRID ═══ */
.stats-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;
  animation:fadeUp 0.5s ease 0.2s both;
}
.stat-card{
  background:var(--glass);backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:18px;padding:16px 14px;
  text-align:center;position:relative;overflow:hidden;
  transition:transform 0.2s,border-color 0.2s;
}
.stat-card:hover{transform:translateY(-3px);}
.stat-card.blue{border-color:rgba(0,200,255,0.22);}
.stat-card.fire{border-color:rgba(255,106,0,0.3);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;}
.stat-card.blue::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.stat-card.fire::before{background:linear-gradient(90deg,transparent,var(--fire),transparent);}
.stat-icon{font-size:22px;margin-bottom:4px;line-height:1;display:block;}
.stat-number{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px;line-height:1;display:block;}
.stat-card.blue .stat-number{color:var(--blue);}
.stat-card.fire .stat-number{background:linear-gradient(135deg,var(--fire),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-label{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase;margin-top:3px;display:block;}
.stat-sub{font-size:9px;letter-spacing:1px;margin-top:2px;display:block;}
.stat-card.blue .stat-sub{color:rgba(0,200,255,0.45);}
.stat-card.fire .stat-sub{color:rgba(255,140,0,0.5);}

/* ═══ WEEKLY CALENDAR ═══ */
.week-section{
  background:var(--glass);backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:18px;
  padding:16px;margin-bottom:12px;position:relative;overflow:hidden;
  animation:fadeUp 0.5s ease 0.3s both;
}
.week-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,0.35),transparent);
}
.section-title{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.28);text-transform:uppercase;margin-bottom:13px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.day-cell{display:flex;flex-direction:column;align-items:center;gap:5px;}
.day-name{font-size:8px;letter-spacing:0.5px;color:rgba(255,255,255,0.25);text-transform:uppercase;font-weight:700;}
.day-dot{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid rgba(255,255,255,0.09);font-size:15px;transition:all 0.3s;
}
.day-dot.today{border-color:var(--blue);box-shadow:0 0 10px rgba(0,200,255,0.3);}
.day-dot.complete{background:linear-gradient(135deg,rgba(255,106,0,0.28),rgba(255,215,0,0.18));border-color:rgba(255,180,0,0.7);}
.day-dot.partial{background:rgba(0,200,255,0.09);border-color:rgba(0,200,255,0.35);}
.day-dot.empty{background:rgba(255,255,255,0.025);}
.day-dot.future{opacity:0.25;background:rgba(255,255,255,0.02);}
.day-num{font-size:9px;font-family:'Bebas Neue',sans-serif;color:rgba(255,255,255,0.22);}
.day-dot.today .day-num{color:var(--blue);}

.streak-fires{
  display:flex;align-items:center;justify-content:center;
  gap:4px;margin-top:11px;
}
.sf-label{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.22);margin-right:4px;text-transform:uppercase;}
.sf-icon{font-size:14px;filter:grayscale(1) brightness(0.5);transition:filter 0.3s;}
.sf-icon.lit{filter:none;}

/* ═══ TASKS ═══ */
.tasks-section{
  background:var(--glass);backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:18px;
  padding:16px;margin-bottom:12px;
  animation:fadeUp 0.5s ease 0.4s both;
}
.tasks-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.tasks-title{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.28);text-transform:uppercase;}
.tasks-count{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--cyan);letter-spacing:1px;}

.add-box{display:flex;gap:8px;margin-bottom:12px;}
.add-box input{
  flex:1;padding:11px 14px;border:1px solid rgba(255,255,255,0.09);border-radius:12px;
  background:rgba(255,255,255,0.045);color:white;font-size:13px;
  font-family:'Rajdhani',sans-serif;letter-spacing:0.5px;
  outline:none;transition:border-color 0.2s;
}
.add-box input:focus{border-color:rgba(0,200,255,0.4);}
.add-box input::placeholder{color:rgba(255,255,255,0.22);}
.add-box button{
  padding:11px 16px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--blue),#0088dd);
  color:white;cursor:pointer;font-size:20px;font-weight:bold;
  transition:opacity 0.2s,transform 0.1s;line-height:1;
}
.add-box button:hover{opacity:0.85;transform:scale(1.05);}
.add-box button:active{transform:scale(0.95);}

.task{
  background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.065);
  padding:12px 14px;border-radius:12px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
  transition:all 0.22s;
}
.task:hover{background:rgba(255,255,255,0.065);transform:translateX(3px);}
.task.done{opacity:0.42;border-color:rgba(0,200,255,0.12);}
.task.done span{text-decoration:line-through;}
.task-left{display:flex;align-items:center;gap:11px;font-size:14px;letter-spacing:0.3px;}
.task input[type=checkbox]{width:17px;height:17px;accent-color:var(--cyan);cursor:pointer;}
.remove{background:none;border:none;color:rgba(255,70,70,0.45);font-size:14px;cursor:pointer;transition:color 0.2s;padding:2px 5px;}
.remove:hover{color:#ff4d4d;}

/* ═══ CTRL BAR ═══ */
#ctrl-bar{
  position:fixed;bottom:18px;right:18px;
  display:flex;flex-direction:column;gap:7px;z-index:200;
}
#ctrl-bar button{
  padding:8px 13px;border:1px solid rgba(255,255,255,0.13);
  border-radius:30px;background:rgba(0,0,0,0.62);
  backdrop-filter:blur(12px);color:white;font-size:11px;
  cursor:pointer;transition:background 0.2s;white-space:nowrap;
  font-family:'Rajdhani',sans-serif;letter-spacing:1px;
}
#ctrl-bar button:hover{background:rgba(255,255,255,0.1);}
#btn-play{color:#00ff88;border-color:#00ff88;}
#btn-bg{color:var(--blue);border-color:var(--blue);}
#btn-reset{color:rgba(255,80,80,0.65);border-color:rgba(255,80,80,0.35);font-size:10px;}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<!-- ══════ INTRO ══════ -->
<div id="intro">
  <div class="intro-logo">LOOKMAXING</div>
  <div class="intro-sub">carregando seu progresso</div>
  <div class="load-wrap">
    <div class="load-label" id="load-label">Inicializando</div>
    <div class="load-track"><div class="load-fill" id="load-fill"></div></div>
    <div class="load-pct" id="load-pct">0%</div>
    <div class="load-status" id="load-status">&nbsp;</div>
  </div>
</div>

<!-- ══════ BG ══════ -->
<div id="bg-img"></div>
<video id="bg-video" loop playsinline><source src="video.mp4" type="video/mp4"></video>

<!-- ══════ CTRL ══════ -->
<div id="ctrl-bar">
  <button id="btn-play" onclick="toggleVideo()">▶ Vídeo</button>
  <button id="btn-bg"   onclick="toggleBg()">🖼 Imagem</button>
  <button id="btn-reset" onclick="resetStart()">⟳ Resetar início</button>
</div>

<!-- ══════ APP ══════ -->
<div class="app" id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <h1>LOOKMAXING</h1>
      <div class="data-badge" id="data-badge">—</div>
    </div>
    <div class="progress-label">Progresso de hoje</div>
    <div class="progress-container">
      <div class="progress" id="progress"></div>
    </div>
    <div class="percent" id="percent">0% concluído hoje</div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card blue">
      <span class="stat-icon">📅</span>
      <span class="stat-number" id="stat-dias">0</span>
      <span class="stat-label">Dias no lookmax</span>
      <span class="stat-sub" id="stat-inicio">desde o início</span>
    </div>
    <div class="stat-card fire">
      <span class="stat-icon">🔥</span>
      <span class="stat-number" id="stat-streak">0</span>
      <span class="stat-label">Streak consecutivo</span>
      <span class="stat-sub" id="stat-streak-sub">dias completos</span>
    </div>
  </div>

  <!-- WEEKLY CALENDAR -->
  <div class="week-section">
    <div class="section-title">📆 Semana — check-ins diários</div>
    <div class="week-grid" id="week-grid"></div>
    <div class="streak-fires" id="streak-fires"></div>
  </div>

  <!-- TASKS -->
  <div class="tasks-section">
    <div class="tasks-header">
      <span class="tasks-title">🎯 Rotina diária</span>
      <span class="tasks-count" id="tasks-count">0/0</span>
    </div>
    <div class="add-box">
      <input type="text" id="novaTarefa" placeholder="Adicionar nova rotina..." onkeydown="if(event.key==='Enter') addTask()">
      <button onclick="addTask()">+</button>
    </div>
    <div id="lista"></div>
  </div>

</div>

<script>
/* ════════════════════════════════════
   INTRO LOADING
════════════════════════════════════ */
const loadSteps = [
  [8,  "Iniciando sistema..."],
  [22, "Carregando perfil..."],
  [40, "Lendo histórico de check-ins..."],
  [58, "Calculando streak 🔥..."],
  [72, "Sincronizando rotinas..."],
  [88, "Preparando interface..."],
  [100,"Tudo pronto. Let's go!"],
];
let pct=0, stepIdx=0;
const fillEl  = document.getElementById('load-fill');
const pctEl   = document.getElementById('load-pct');
const labelEl = document.getElementById('load-label');
const statEl  = document.getElementById('load-status');

function runIntro(){
  const iv = setInterval(()=>{
    if(stepIdx < loadSteps.length && pct >= loadSteps[stepIdx][0]-1){
      const msg = loadSteps[stepIdx][1];
      labelEl.textContent = statEl.textContent = msg;
      stepIdx++;
    }
    if(pct < 100){ pct++; fillEl.style.width=pct+'%'; pctEl.textContent=pct+'%'; }
    else{
      clearInterval(iv);
      setTimeout(()=>{
        document.getElementById('intro').classList.add('hide');
        document.getElementById('app').classList.add('visible');
      }, 600);
    }
  }, 26);
}
window.addEventListener('load', runIntro);

/* ════════════════════════════════════
   HELPERS
════════════════════════════════════ */
function dateKey(d){ return d.toISOString().slice(0,10); }
function today(){ return dateKey(new Date()); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }

function getMondayOfWeek(d){
  const day=d.getDay();
  const diff=(day===0)?-6:1-day;
  const m=new Date(d); m.setDate(d.getDate()+diff); return m;
}

/* ════════════════════════════════════
   STORAGE
════════════════════════════════════ */
function ld(k,def){ try{ const v=localStorage.getItem(k); return v!==null?JSON.parse(v):def; }catch(e){return def;} }
function sv(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

/* ════════════════════════════════════
   STATE
════════════════════════════════════ */
let tarefas  = ld('lm_tarefas', []);
let checks   = ld('lm_checks',  {}); // { "YYYY-MM-DD": { "0":true, ... } }
let fullDays = ld('lm_full',    []); // datas com 100%
let startDate= ld('lm_start',   null);

if(!startDate){ startDate=today(); sv('lm_start',startDate); }

function salvar(){ sv('lm_tarefas',tarefas); sv('lm_checks',checks); sv('lm_full',fullDays); }

/* ════════════════════════════════════
   TAREFAS
════════════════════════════════════ */
function addTask(){
  const v=document.getElementById('novaTarefa').value.trim();
  if(!v) return;
  tarefas.push(v);
  document.getElementById('novaTarefa').value='';
  salvar(); render();
}
function remover(i){ tarefas.splice(i,1); salvar(); render(); }
function toggle(i){
  const tk=today();
  if(!checks[tk]) checks[tk]={};
  checks[tk][i]=!checks[tk][i];
  salvar(); render();
}

/* ════════════════════════════════════
   STREAK
════════════════════════════════════ */
function calcStreak(){
  if(!fullDays.length) return 0;
  const set=new Set(fullDays);
  const tk=today();
  const yk=dateKey(addDays(new Date(),-1));
  // começa em hoje ou ontem
  let cur=set.has(tk)?new Date():set.has(yk)?addDays(new Date(),-1):null;
  if(!cur) return 0;
  let s=0;
  while(set.has(dateKey(cur))){ s++; cur=addDays(cur,-1); }
  return s;
}

/* ════════════════════════════════════
   RENDER SEMANA
════════════════════════════════════ */
const DNAMES=['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];

function renderWeek(){
  const grid=document.getElementById('week-grid');
  const sfRow=document.getElementById('streak-fires');
  grid.innerHTML=''; sfRow.innerHTML='';

  const now=new Date();
  const tk=today();
  const mon=getMondayOfWeek(now);

  for(let i=0;i<7;i++){
    const d=addDays(mon,i);
    const dk=dateKey(d);
    const isToday=dk===tk;
    const isFuture=d>now && !isToday;
    const isComplete=fullDays.includes(dk);
    const dayC=checks[dk]||{};
    const done=Object.values(dayC).filter(Boolean).length;
    const isPartial=done>0 && !isComplete && !isFuture;

    let cls='day-dot'; let inner='';
    if(isComplete){ cls+=' complete'; inner='🔥'; }
    else if(isPartial){ cls+=' partial'; inner='⚡'; }
    else if(isFuture){ cls+=' future'; inner=`<span class="day-num">${d.getDate()}</span>`; }
    else{ cls+=isToday?' today':' empty'; inner=`<span class="day-num">${d.getDate()}</span>`; }

    const cell=document.createElement('div');
    cell.className='day-cell';
    cell.innerHTML=`<div class="day-name">${DNAMES[i]}</div><div class="${cls}">${inner}</div>`;
    grid.appendChild(cell);
  }

  // streak fire row
  const streak=calcStreak();
  const lbl=document.createElement('span');
  lbl.className='sf-label'; lbl.textContent='STREAK';
  sfRow.appendChild(lbl);
  for(let i=0;i<7;i++){
    const s=document.createElement('span');
    s.className='sf-icon'+(i<streak?' lit':'');
    s.textContent='🔥';
    sfRow.appendChild(s);
  }
}

/* ════════════════════════════════════
   RENDER PRINCIPAL
════════════════════════════════════ */
function render(){
  const now=new Date();
  const tk=today();
  if(!checks[tk]) checks[tk]={};

  // badge data
  document.getElementById('data-badge').textContent=
    now.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();

  // tarefas
  const lista=document.getElementById('lista');
  lista.innerHTML='';
  let feitos=0;
  tarefas.forEach((t,i)=>{
    const feito=!!checks[tk][i];
    if(feito) feitos++;
    const div=document.createElement('div');
    div.className='task'+(feito?' done':'');
    div.innerHTML=`
      <div class="task-left">
        <input type="checkbox" ${feito?'checked':''} onclick="toggle(${i})">
        <span>${t}</span>
      </div>
      <button class="remove" onclick="remover(${i})">✕</button>`;
    lista.appendChild(div);
  });

  const total=tarefas.length;
  const pct2=total?Math.round((feitos/total)*100):0;
  document.getElementById('progress').style.width=pct2+'%';
  document.getElementById('percent').textContent=pct2+'% concluído hoje';
  document.getElementById('tasks-count').textContent=feitos+'/'+total;

  // marcar/desmarcar dia completo
  if(total>0 && feitos===total){
    if(!fullDays.includes(tk)){ fullDays.push(tk); salvar(); }
  } else {
    const idx=fullDays.indexOf(tk);
    if(idx>-1){ fullDays.splice(idx,1); salvar(); }
  }

  // stats
  const start=new Date(startDate+'T00:00:00');
  const dias=Math.max(1,Math.floor((now-start)/(86400000))+1);
  document.getElementById('stat-dias').textContent=dias;
  document.getElementById('stat-inicio').textContent=
    'desde '+start.toLocaleDateString('pt-BR',{day:'numeric',month:'short'});

  const streak=calcStreak();
  document.getElementById('stat-streak').textContent=streak;
  document.getElementById('stat-streak-sub').textContent=
    streak===0?'comece hoje!':streak===1?'1 dia seguido':streak+' dias seguidos';

  renderWeek();
}

function resetStart(){
  if(confirm('Resetar data de início do lookmaxxing para hoje?')){
    startDate=today(); sv('lm_start',startDate); render();
  }
}

/* ════════════════════════════════════
   BG / VIDEO
════════════════════════════════════ */
let bgMode='image', videoPlaying=false;
const vid=document.getElementById('bg-video');
const bgImgEl=document.getElementById('bg-img');

function toggleVideo(){
  const btn=document.getElementById('btn-play');
  if(!videoPlaying){
    vid.play().then(()=>{ videoPlaying=true; btn.textContent='⏸ Pausar'; })
              .catch(()=>{ btn.textContent='❌ Erro'; });
  } else {
    vid.pause(); videoPlaying=false; btn.textContent='▶ Vídeo';
  }
}
function toggleBg(){
  const btn=document.getElementById('btn-bg');
  if(bgMode==='image'){
    bgMode='video'; bgImgEl.style.display='none'; vid.style.display='block'; btn.textContent='📷 Vídeo';
    vid.play().then(()=>{ videoPlaying=true; document.getElementById('btn-play').textContent='⏸ Pausar'; }).catch(()=>{});
  } else {
    bgMode='image'; bgImgEl.style.display='block'; vid.style.display='none';
    vid.pause(); videoPlaying=false;
    document.getElementById('btn-play').textContent='▶ Vídeo';
    btn.textContent='🖼 Imagem';
  }
}

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
render();
</script>
