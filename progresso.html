<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Progresso — LOOKMAXING</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --accent:#00C2FF;
  --accent2:#00FFD1;
  --gold:#FFB800;
  --fire:#FF6200;
  --green:#00E676;
  --danger:#FF3B5C;
  --bg:#0A0C10;
  --surface:#13161C;
  --surface2:#1A1E28;
  --surface3:#222635;
  --border:#2A2E3E;
  --border2:#323748;
  --txt:#FFFFFF;
  --txt2:#A0A8C0;
  --txt3:#5A617A;
  --shadow:0 4px 24px rgba(0,0,0,0.55);
  --shadow-accent:0 4px 20px rgba(0,194,255,0.2);
  --shadow-gold:0 4px 20px rgba(255,184,0,0.2);
}

html,body{height:100%;scrollbar-width:none;}
body::-webkit-scrollbar{display:none;}

/* ══ BG ══ */
#bg-wrap{
  position:fixed;inset:0;z-index:0;
  background:var(--bg);
}
#bg-img{
  position:absolute;inset:-20px;
  background:url('fundo.png') center top/cover no-repeat;
  opacity:0.12;
  animation:bgFloat 12s ease-in-out infinite;
}
@keyframes bgFloat{
  0%,100%{transform:scale(1.06) translate(0,0);}
  50%{transform:scale(1.08) translate(-4px,3px);}
}
#bg-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(10,12,16,0.6) 0%,rgba(10,12,16,0.4) 40%,rgba(10,12,16,0.85) 100%);
}

/* ══ LAYOUT ══ */
body{
  color:var(--txt);font-family:'Inter',sans-serif;
  display:flex;justify-content:center;
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
}
.app{
  width:100%;max-width:430px;
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  min-height:100vh;min-height:100dvh;
}
.scroll-area{
  flex:1;overflow-y:auto;
  padding-bottom:90px;
  scrollbar-width:none;
}
.scroll-area::-webkit-scrollbar{display:none;}

/* ══ HERO ══ */
.hero{
  position:relative;height:200px;overflow:hidden;flex-shrink:0;
}
.hero-bg{
  position:absolute;inset:-10px;
  background:url('fundo.png') center top/cover no-repeat;
  animation:bgFloat 12s ease-in-out infinite;
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(10,12,16,0.3) 0%,rgba(10,12,16,0.0) 35%,rgba(10,12,16,1) 100%);
}
.hero-content{
  position:absolute;inset:0;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:20px 20px 20px;
}
.hero-eyebrow{
  font-size:10px;font-weight:600;letter-spacing:3px;
  color:rgba(255,255,255,0.45);text-transform:uppercase;margin-bottom:4px;
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:7px;line-height:1;
  background:linear-gradient(90deg,#fff 30%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:0.5px;margin-top:3px;}

/* ══ CARDS ══ */
.cards{padding:16px 16px 0;}

/* ══ SECTION CARD ══ */
.section-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:20px;margin-bottom:14px;
  box-shadow:var(--shadow);
}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.section-title{
  font-size:11px;font-weight:700;letter-spacing:2px;
  color:var(--txt2);text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.section-title em{font-size:15px;font-style:normal;}

/* ══ STAT SUMMARY ══ */
.summary-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:10px;margin-bottom:14px;
}
.sum-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:16px;padding:14px 10px;text-align:center;
}
.sum-num{
  font-family:'Bebas Neue',sans-serif;font-size:28px;
  letter-spacing:1px;line-height:1;
}
.sum-num.blue{color:var(--accent);}
.sum-num.gold{background:linear-gradient(135deg,var(--fire),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sum-num.green{color:var(--green);}
.sum-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;margin-top:4px;}

/* ══ PRIMEIRO DIA — upload especial ══ */
.day-zero-card{
  background:linear-gradient(145deg,#0E1219,#121828);
  border:1.5px solid rgba(0,194,255,0.3);
  border-radius:20px;padding:20px;margin-bottom:14px;
  box-shadow:var(--shadow-accent);
  position:relative;overflow:hidden;
}
.day-zero-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.dz-label{
  font-size:10px;font-weight:700;letter-spacing:3px;
  color:var(--accent);text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.dz-label::after{
  content:'DIA 1';font-family:'Bebas Neue',sans-serif;
  font-size:11px;background:rgba(0,194,255,0.12);
  border:1px solid rgba(0,194,255,0.3);border-radius:6px;
  padding:2px 8px;color:var(--accent);letter-spacing:2px;
}
.dz-img-wrap{
  width:100%;aspect-ratio:3/4;max-height:340px;
  border-radius:14px;overflow:hidden;
  background:var(--surface3);border:2px dashed var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color 0.2s,background 0.2s;
  position:relative;
}
.dz-img-wrap:hover{border-color:var(--accent);background:rgba(0,194,255,0.04);}
.dz-img-wrap img{
  width:100%;height:100%;object-fit:cover;
  border-radius:12px;display:none;
}
.dz-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  color:var(--txt3);
}
.dz-placeholder-icon{font-size:36px;opacity:0.6;}
.dz-placeholder-txt{font-size:13px;font-weight:600;color:var(--txt3);letter-spacing:0.5px;}
.dz-placeholder-sub{font-size:11px;color:var(--txt3);opacity:0.6;}
.dz-change-btn{
  margin-top:12px;width:100%;
  padding:11px;border:1.5px solid rgba(0,194,255,0.3);
  border-radius:12px;background:rgba(0,194,255,0.08);
  color:var(--accent);font-size:12px;font-weight:600;
  letter-spacing:1px;cursor:pointer;transition:all 0.2s;
  display:none;
}
.dz-change-btn:active{transform:scale(0.97);}

/* ══ TIMELINE DE MESES ══ */
.timeline{display:flex;flex-direction:column;gap:14px;}

.month-entry{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
  box-shadow:var(--shadow);
  animation:fadeUp 0.3s ease both;
}
.month-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--surface2);
  border-bottom:1px solid var(--border);
}
.month-badge{
  display:flex;align-items:center;gap:10px;
}
.month-dot{
  width:10px;height:10px;border-radius:50%;
  background:linear-gradient(135deg,var(--fire),var(--gold));
  box-shadow:0 0 8px rgba(255,184,0,0.5);flex-shrink:0;
}
.month-name{
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  letter-spacing:2px;color:var(--txt);
}
.month-date-lbl{font-size:10px;color:var(--txt3);letter-spacing:0.5px;}
.month-del-btn{
  background:none;border:none;cursor:pointer;
  color:var(--txt3);font-size:15px;padding:5px 8px;
  border-radius:8px;transition:color 0.2s;
}
.month-del-btn:hover{color:var(--danger);}

.month-img-area{
  position:relative;width:100%;aspect-ratio:3/4;max-height:320px;
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.month-img-area img{
  width:100%;height:100%;object-fit:cover;display:none;
}
.month-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--txt3);
}
.month-placeholder-icon{font-size:28px;opacity:0.5;}
.month-placeholder-txt{font-size:12px;font-weight:600;color:var(--txt3);}
.month-has-img .month-placeholder{display:none;}
.month-has-img img{display:block;}

/* ══ BOTÃO ADICIONAR MÊS ══ */
.add-month-btn{
  width:100%;padding:15px;
  background:var(--surface2);border:1.5px dashed var(--border2);
  border-radius:16px;
  color:var(--txt3);font-size:13px;font-weight:600;
  letter-spacing:1px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.2s;margin-top:4px;
}
.add-month-btn:active{transform:scale(0.98);}
.add-month-btn:hover{border-color:var(--gold);color:var(--gold);}
.add-month-btn-icon{font-size:18px;}

/* ══ COMPARAÇÃO ANTES/DEPOIS ══ */
.compare-section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:20px;margin-bottom:14px;
  box-shadow:var(--shadow);
}
.compare-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;
}
.compare-side{display:flex;flex-direction:column;gap:8px;}
.compare-lbl{
  font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;text-align:center;
}
.compare-lbl.antes{color:var(--accent);}
.compare-lbl.depois{color:var(--gold);}
.compare-img{
  width:100%;aspect-ratio:3/4;
  border-radius:12px;overflow:hidden;
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
}
.compare-img img{width:100%;height:100%;object-fit:cover;display:none;}
.compare-img.has-img img{display:block;}
.compare-empty{font-size:10px;color:var(--txt3);text-align:center;padding:10px;}
.compare-arrow{
  display:flex;align-items:center;justify-content:center;
  font-size:22px;align-self:center;margin-top:16px;
  color:var(--gold);
}

/* ══ BOTTOM BAR ══ */
.bottom-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(19,22,28,0.97);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:10px 20px 16px;
  display:flex;gap:10px;z-index:200;
}
.bb-link{
  flex:1;padding:12px;border-radius:14px;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  border:1.5px solid var(--border2);background:var(--surface2);
  color:var(--txt2);text-decoration:none;text-align:center;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.bb-link:active{transform:scale(0.96);}
.bb-link.primary{border-color:rgba(0,194,255,0.4);color:var(--accent);}

/* ══ INPUT FILE OCULTO ══ */
input[type=file]{display:none;}

/* ══ TOAST ══ */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:14px;padding:12px 20px;
  font-size:13px;font-weight:600;color:var(--txt);
  box-shadow:var(--shadow);z-index:9999;
  transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;display:flex;align-items:center;gap:8px;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ══ ANIMATIONS ══ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}
.hero{animation:fadeUp 0.4s ease 0.05s both;}
.section-card{animation:fadeUp 0.4s ease 0.1s both;}
.day-zero-card{animation:fadeUp 0.4s ease 0.15s both;}
.compare-section{animation:fadeUp 0.4s ease 0.2s both;}
</style>
</head>
<body>

<!-- BG -->
<div id="bg-wrap"><div id="bg-img"></div></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- INPUT FILE OCULTO -->
<input type="file" id="file-input" accept="image/*">

<!-- APP -->
<div class="app">
<div class="scroll-area">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-eyebrow">lookmaxxing</div>
      <div class="hero-title">MEU PROGRESSO</div>
      <div class="hero-sub" id="hero-sub">Acompanhe sua evolução</div>
    </div>
  </div>

  <div class="cards">

    <!-- RESUMO -->
    <div class="summary-row" id="summary-row">
      <div class="sum-card">
        <div class="sum-num blue" id="sum-dias">0</div>
        <div class="sum-lbl">Dias</div>
      </div>
      <div class="sum-card">
        <div class="sum-num gold" id="sum-meses">0</div>
        <div class="sum-lbl">Meses</div>
      </div>
      <div class="sum-card">
        <div class="sum-num green" id="sum-fotos">0</div>
        <div class="sum-lbl">Fotos</div>
      </div>
    </div>

    <!-- DIA 1 -->
    <div class="day-zero-card" id="day-zero-card">
      <div class="dz-label">📸 Foto inicial</div>
      <div class="dz-img-wrap" id="dz-wrap" onclick="triggerUpload('day0',null)">
        <img id="dz-img" src="" alt="Foto do primeiro dia">
        <div class="dz-placeholder" id="dz-placeholder">
          <div class="dz-placeholder-icon">📷</div>
          <div class="dz-placeholder-txt">Fazer upload do 1º dia</div>
          <div class="dz-placeholder-sub">Essa é sua linha de base</div>
        </div>
      </div>
      <button class="dz-change-btn" id="dz-change" onclick="triggerUpload('day0',null)">
        🔄 Trocar foto do dia 1
      </button>
    </div>

    <!-- COMPARAÇÃO ANTES / DEPOIS -->
    <div class="compare-section" id="compare-section" style="display:none;">
      <div class="section-header">
        <div class="section-title"><em>⚡</em> Antes vs Agora</div>
      </div>
      <div class="compare-grid">
        <div class="compare-side">
          <div class="compare-lbl antes">Antes</div>
          <div class="compare-img" id="cmp-antes">
            <img id="cmp-antes-img" src="" alt="Antes">
            <div class="compare-empty">Sem foto</div>
          </div>
        </div>
        <div class="compare-side">
          <div class="compare-lbl depois">Agora</div>
          <div class="compare-img" id="cmp-depois">
            <img id="cmp-depois-img" src="" alt="Depois">
            <div class="compare-empty">Sem foto</div>
          </div>
        </div>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-title"><em>📅</em> Linha do tempo</div>
      </div>
      <div class="timeline" id="timeline"></div>
      <button class="add-month-btn" id="add-month-btn" onclick="addMonth()">
        <span class="add-month-btn-icon">＋</span>
        Adicionar novo mês
      </button>
    </div>

  </div><!-- /cards -->
</div><!-- /scroll-area -->

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <a href="lookmaxing.html" class="bb-link">⬅ Rotina</a>
  <button class="bb-link primary" onclick="addMonth()">＋ Novo mês</button>
</div>
</div><!-- /app -->

<script>
/* ══════════════════════════════════════
   STORAGE
══════════════════════════════════════ */
const ld = (k,def) => { try{ const v=localStorage.getItem(k); return v!==null?JSON.parse(v):def; }catch(e){return def;} };
const sv = (k,v)   => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ showToast('⚠️ Armazenamento cheio!'); } };

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
// months = [ { id, label, date, img:base64|null } ]
let months   = ld('lm_prog_months', []);
let day0img  = ld('lm_prog_day0',   null);
let startDate= ld('lm_start',       null);

// callback atual de upload
let pendingUpload = null; // { type:'day0'|'month', id:string|null }

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ══════════════════════════════════════
   FILE → BASE64
══════════════════════════════════════ */
function fileToBase64(file){
  return new Promise((res,rej)=>{
    // Redimensionar para economizar espaço no localStorage
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=800;
        let w=img.width, h=img.height;
        if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} }
        else    { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        res(canvas.toDataURL('image/jpeg',0.75));
      };
      img.onerror=rej;
      img.src=e.target.result;
    };
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });
}

/* ══════════════════════════════════════
   UPLOAD TRIGGER
══════════════════════════════════════ */
function triggerUpload(type, id){
  pendingUpload={type,id};
  document.getElementById('file-input').value='';
  document.getElementById('file-input').click();
}

document.getElementById('file-input').addEventListener('change', async e=>{
  const file=e.target.files[0];
  if(!file || !pendingUpload) return;

  showToast('⏳ Processando imagem...');
  try{
    const b64=await fileToBase64(file);

    if(pendingUpload.type==='day0'){
      day0img=b64;
      sv('lm_prog_day0',day0img);
      showToast('✅ Foto do dia 1 salva!');
    } else {
      const m=months.find(x=>x.id===pendingUpload.id);
      if(m){ m.img=b64; sv('lm_prog_months',months); showToast('✅ Foto salva!'); }
    }
    render();
  } catch(err){
    showToast('❌ Erro ao carregar imagem');
  }
});

/* ══════════════════════════════════════
   ADICIONAR MÊS
══════════════════════════════════════ */
function addMonth(){
  const num=months.length+1;
  const now=new Date();
  const id='m_'+Date.now();
  months.push({
    id,
    label: num===1?'1 Mês':num+' Meses',
    monthNum: num,
    date: now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}),
    img: null
  });
  sv('lm_prog_months',months);
  render();
  showToast('📅 '+months[months.length-1].label+' adicionado!');
  // Rolar para o final
  setTimeout(()=>{
    document.querySelector('.scroll-area').scrollTo({top:99999,behavior:'smooth'});
  },200);
}

/* ══════════════════════════════════════
   DELETAR MÊS
══════════════════════════════════════ */
function deleteMonth(id){
  if(!confirm('Remover esse mês do progresso?')) return;
  months=months.filter(m=>m.id!==id);
  // Renumerar labels
  months.forEach((m,i)=>{
    m.monthNum=i+1;
    m.label=(i+1===1)?'1 Mês':(i+1)+' Meses';
  });
  sv('lm_prog_months',months);
  render();
  showToast('🗑️ Mês removido');
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function render(){
  renderDay0();
  renderSummary();
  renderTimeline();
  renderCompare();
  renderHeroSub();
}

function renderDay0(){
  const img=document.getElementById('dz-img');
  const ph =document.getElementById('dz-placeholder');
  const btn=document.getElementById('dz-change');
  if(day0img){
    img.src=day0img; img.style.display='block';
    ph.style.display='none'; btn.style.display='block';
  } else {
    img.style.display='none';
    ph.style.display='flex'; btn.style.display='none';
  }
}

function renderSummary(){
  const start=startDate?new Date(startDate+'T00:00:00'):null;
  const dias=start?Math.max(1,Math.floor((new Date()-start)/86400000)+1):0;
  const totalFotos=(day0img?1:0)+months.filter(m=>m.img).length;
  document.getElementById('sum-dias').textContent=dias;
  document.getElementById('sum-meses').textContent=months.length;
  document.getElementById('sum-fotos').textContent=totalFotos;
}

function renderTimeline(){
  const tl=document.getElementById('timeline');
  tl.innerHTML='';

  if(months.length===0){
    tl.innerHTML=`<div style="text-align:center;padding:24px 0;color:var(--txt3);font-size:13px;">
      <div style="font-size:28px;margin-bottom:8px;">📸</div>
      Adicione seu primeiro mês de progresso!
    </div>`;
    return;
  }

  months.forEach((m,idx)=>{
    const entry=document.createElement('div');
    entry.className='month-entry';
    entry.style.animationDelay=(idx*0.05)+'s';

    const hasImg=!!m.img;

    entry.innerHTML=`
      <div class="month-header">
        <div class="month-badge">
          <div class="month-dot"></div>
          <div>
            <div class="month-name">${m.label.toUpperCase()}</div>
            <div class="month-date-lbl">${m.date}</div>
          </div>
        </div>
        <button class="month-del-btn" onclick="deleteMonth('${m.id}')">✕</button>
      </div>
      <div class="month-img-area ${hasImg?'month-has-img':''}"
           onclick="triggerUpload('month','${m.id}')">
        <img src="${m.img||''}" alt="${m.label}">
        <div class="month-placeholder">
          <div class="month-placeholder-icon">📷</div>
          <div class="month-placeholder-txt">Toque para adicionar foto</div>
        </div>
      </div>
    `;
    tl.appendChild(entry);
  });
}

function renderCompare(){
  const sec=document.getElementById('compare-section');
  // Só mostrar se tiver foto do dia 0 e pelo menos 1 mês com foto
  const lastWithImg=[...months].reverse().find(m=>m.img);
  if(!day0img || !lastWithImg){ sec.style.display='none'; return; }

  sec.style.display='block';
  const antesImg=document.getElementById('cmp-antes-img');
  const depoisImg=document.getElementById('cmp-depois-img');
  const antesBox=document.getElementById('cmp-antes');
  const depoisBox=document.getElementById('cmp-depois');

  antesImg.src=day0img; antesImg.style.display='block';
  antesBox.classList.add('has-img');
  depoisImg.src=lastWithImg.img; depoisImg.style.display='block';
  depoisBox.classList.add('has-img');
}

function renderHeroSub(){
  const total=(day0img?1:0)+months.filter(m=>m.img).length;
  const sub=total===0
    ? 'Adicione sua primeira foto 📸'
    : total===1
    ? 'Jornada iniciada! Continue assim 💪'
    : 'Você tem '+total+' fotos de progresso 🔥';
  document.getElementById('hero-sub').textContent=sub;
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
render();
</script>
</body>
