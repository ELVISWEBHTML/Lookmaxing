<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LOOKMAXING</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   RESET & TOKENS
══════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  /* cores */
  --accent:#00C2FF;
  --accent2:#00FFD1;
  --fire:#FF6200;
  --gold:#FFB800;
  --danger:#FF3B5C;
  --green:#00E676;

  /* superfícies sólidas escuras */
  --bg:#0A0C10;
  --surface:#13161C;
  --surface2:#1A1E28;
  --surface3:#222635;
  --border:#2A2E3E;
  --border2:#323748;

  /* texto */
  --txt:#FFFFFF;
  --txt2:#A0A8C0;
  --txt3:#5A617A;

  /* sombras */
  --shadow:0 4px 20px rgba(0,0,0,0.5);
  --shadow-accent:0 4px 20px rgba(0,194,255,0.2);
  --shadow-fire:0 4px 16px rgba(255,98,0,0.25);
}

/* ══════════════════════════════════════
   INTRO
══════════════════════════════════════ */
#intro{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);
  transition:opacity 0.8s ease, visibility 0.8s;
}
#intro.hide{opacity:0;visibility:hidden;pointer-events:none;}

.intro-ring{
  position:relative;width:120px;height:120px;
  margin-bottom:32px;
}
.intro-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface3);stroke-width:4;}
.ring-fill{
  fill:none;stroke:url(#ringGrad);stroke-width:4;
  stroke-linecap:round;
  stroke-dasharray:340;stroke-dashoffset:340;
  transition:stroke-dashoffset 0.05s linear;
}
.ring-pct{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.ring-num{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--accent);letter-spacing:2px;line-height:1;}
.ring-label{font-family:'Inter',sans-serif;font-size:9px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

.intro-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(44px,13vw,72px);
  letter-spacing:10px;text-align:center;line-height:1;
  background:linear-gradient(100deg,#fff 20%,var(--accent) 55%,var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:glow 2.2s ease-in-out infinite alternate;
  margin-bottom:8px;
}
@keyframes glow{
  from{filter:drop-shadow(0 0 6px rgba(0,194,255,0.3));}
  to{filter:drop-shadow(0 0 22px rgba(0,255,209,0.7));}
}
.intro-tagline{
  font-family:'Inter',sans-serif;font-size:11px;
  letter-spacing:5px;color:var(--txt3);text-transform:uppercase;
  margin-bottom:48px;
}
.load-status-txt{
  font-family:'Inter',sans-serif;font-size:11px;
  color:var(--txt3);letter-spacing:1.5px;margin-top:16px;
  min-height:16px;text-align:center;
}

/* ══════════════════════════════════════
   BG FUNDO
══════════════════════════════════════ */
#bg-wrap{
  position:fixed;inset:0;z-index:0;
  background:var(--bg);
}
#bg-img{
  position:absolute;inset:-20px;
  background:url('fundo.png') center top/cover no-repeat;
  animation:bgFloat 10s ease-in-out infinite;
  opacity:0.18;
}
@keyframes bgFloat{
  0%,100%{transform:scale(1.06) translate(0,0);}
  50%{transform:scale(1.08) translate(-4px,3px);}
}
#bg-video{
  display:none;position:absolute;top:50%;left:50%;
  min-width:100%;min-height:100%;width:auto;height:auto;
  transform:translate(-50%,-50%);object-fit:cover;opacity:0.2;
}
/* overlay escuro por cima do fundo */
#bg-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(10,12,16,0.7) 0%,rgba(10,12,16,0.55) 40%,rgba(10,12,16,0.8) 100%);
}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
body{
  min-height:100vh;min-height:100dvh;
  color:var(--txt);font-family:'Inter',sans-serif;
  display:flex;justify-content:center;
  background:var(--bg);
  overflow-x:hidden;
}
.app{
  width:100%;max-width:430px;
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  opacity:0;transition:opacity 0.6s ease;
}
.app.visible{opacity:1;}

/* scrollable content area */
.scroll-area{
  flex:1;overflow-y:auto;
  padding:0 0 100px;
  scrollbar-width:none;
}
.scroll-area::-webkit-scrollbar{display:none;}

/* ══════════════════════════════════════
   TOP HERO — fundo com imagem visível
══════════════════════════════════════ */
.hero{
  position:relative;
  height:220px;
  overflow:hidden;
  flex-shrink:0;
}
.hero-bg{
  position:absolute;inset:-10px;
  background:url('fundo.png') center top/cover no-repeat;
  animation:bgFloat 10s ease-in-out infinite;
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(10,12,16,0.35) 0%,rgba(10,12,16,0.0) 40%,rgba(10,12,16,1) 100%);
}
.hero-content{
  position:absolute;inset:0;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:20px 20px 18px;
}
.hero-date{
  font-size:11px;font-weight:500;letter-spacing:2px;
  color:rgba(255,255,255,0.55);text-transform:uppercase;margin-bottom:4px;
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:38px;letter-spacing:8px;line-height:1;
  background:linear-gradient(90deg,#fff 30%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-top:2px;}

/* ══════════════════════════════════════
   CARDS CONTAINER
══════════════════════════════════════ */
.cards{padding:16px 16px 0;}

/* ══════════════════════════════════════
   PROGRESS CARD
══════════════════════════════════════ */
.progress-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px 20px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}
.progress-card-top{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:14px;
}
.progress-card-label{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;}
.progress-pct-badge{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:1px;color:var(--accent);
}
.progress-bar-wrap{
  background:var(--surface3);
  border-radius:99px;height:8px;overflow:hidden;
  margin-bottom:8px;
}
.progress-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:99px;
  transition:width 0.5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 12px rgba(0,194,255,0.4);
}
.progress-foot{
  display:flex;justify-content:space-between;align-items:center;
}
.progress-foot-txt{font-size:11px;color:var(--txt3);}
.progress-foot-tasks{font-size:11px;font-weight:600;color:var(--txt2);}

/* ══════════════════════════════════════
   STATS ROW
══════════════════════════════════════ */
.stats-row{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;margin-bottom:12px;
}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;padding:18px 16px;
  box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:6px;
  transition:transform 0.15s;
}
.stat-card:active{transform:scale(0.97);}
.stat-card.accent{border-color:rgba(0,194,255,0.3);background:linear-gradient(145deg,#13161C,#101420);}
.stat-card.fire-card{border-color:rgba(255,98,0,0.3);background:linear-gradient(145deg,#13161C,#140F0A);}

.stat-icon-row{display:flex;align-items:center;gap:8px;}
.stat-icon{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.stat-card.accent .stat-icon{background:rgba(0,194,255,0.12);}
.stat-card.fire-card .stat-icon{background:rgba(255,98,0,0.12);}

.stat-label{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;}
.stat-value{
  font-family:'Bebas Neue',sans-serif;
  font-size:44px;letter-spacing:2px;line-height:1;
}
.stat-card.accent .stat-value{color:var(--accent);}
.stat-card.fire-card .stat-value{
  background:linear-gradient(135deg,var(--fire),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.stat-sub{font-size:11px;font-weight:500;color:var(--txt3);}

/* ══════════════════════════════════════
   SECTION CARD (wrapper genérico)
══════════════════════════════════════ */
.section-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;padding:18px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.section-title{
  font-size:11px;font-weight:700;
  letter-spacing:2px;color:var(--txt2);text-transform:uppercase;
  display:flex;align-items:center;gap:7px;
}
.section-title span{font-size:14px;}
.section-badge{
  font-family:'Bebas Neue',sans-serif;font-size:14px;
  color:var(--accent);letter-spacing:1px;
}

/* ══════════════════════════════════════
   WEEKLY CALENDAR
══════════════════════════════════════ */
.week-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.day-lbl{
  font-size:9px;font-weight:700;letter-spacing:0.5px;
  color:var(--txt3);text-transform:uppercase;
}
.day-bubble{
  width:36px;height:36px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--border2);
  font-size:14px;transition:all 0.25s;
  position:relative;
}
.day-bubble.today{
  border-color:var(--accent);
  background:rgba(0,194,255,0.1);
  box-shadow:0 0 0 2px rgba(0,194,255,0.15);
}
.day-bubble.complete{
  background:linear-gradient(135deg,rgba(255,98,0,0.25),rgba(255,184,0,0.15));
  border-color:rgba(255,184,0,0.6);
  box-shadow:var(--shadow-fire);
}
.day-bubble.partial{
  background:rgba(0,194,255,0.08);
  border-color:rgba(0,194,255,0.3);
}
.day-bubble.empty{background:var(--surface2);}
.day-bubble.future{background:var(--surface2);opacity:0.3;}
.day-num{
  font-family:'Bebas Neue',sans-serif;font-size:13px;
  color:var(--txt3);line-height:1;
}
.day-bubble.today .day-num{color:var(--accent);}

/* fires row */
.fires-row{
  display:flex;align-items:center;justify-content:center;
  gap:3px;margin-top:14px;padding-top:14px;
  border-top:1px solid var(--border);
}
.fires-label{
  font-size:9px;font-weight:700;letter-spacing:2px;
  color:var(--txt3);text-transform:uppercase;margin-right:8px;
}
.fire-dot{font-size:16px;filter:grayscale(1) brightness(0.35);transition:filter 0.3s,transform 0.3s;}
.fire-dot.on{filter:none;transform:scale(1.1);}

/* ══════════════════════════════════════
   TASK LIST
══════════════════════════════════════ */
.add-row{
  display:flex;gap:8px;margin-bottom:14px;
}
.add-input{
  flex:1;padding:12px 14px;
  border:1.5px solid var(--border2);border-radius:14px;
  background:var(--surface2);
  color:var(--txt);font-size:14px;font-family:'Inter',sans-serif;
  outline:none;transition:border-color 0.2s;
}
.add-input:focus{border-color:var(--accent);}
.add-input::placeholder{color:var(--txt3);}
.add-btn{
  width:46px;height:46px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),#0088CC);
  color:#fff;font-size:22px;font-weight:bold;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity 0.2s,transform 0.1s;
  box-shadow:var(--shadow-accent);
}
.add-btn:active{transform:scale(0.93);}

.task-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:14px;margin-bottom:8px;
  transition:all 0.2s;
}
.task-item:active{transform:scale(0.99);}
.task-item.done{opacity:0.45;background:var(--surface);}
.task-item.done .task-name{text-decoration:line-through;color:var(--txt3);}

/* custom checkbox */
.task-check{
  width:22px;height:22px;border-radius:8px;
  border:2px solid var(--border2);
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.2s;
}
.task-item.done .task-check{
  background:var(--accent);border-color:var(--accent);
  box-shadow:0 0 10px rgba(0,194,255,0.35);
}
.task-check-icon{font-size:13px;opacity:0;transition:opacity 0.2s;}
.task-item.done .task-check-icon{opacity:1;}

.task-name{flex:1;font-size:14px;font-weight:500;color:var(--txt);line-height:1.3;}
.task-del{
  background:none;border:none;cursor:pointer;
  color:var(--txt3);font-size:16px;padding:4px 6px;
  transition:color 0.2s;border-radius:8px;
}
.task-del:hover{color:var(--danger);}

.empty-state{
  text-align:center;padding:24px 0;
  color:var(--txt3);font-size:13px;
  letter-spacing:0.5px;
}
.empty-state div{font-size:28px;margin-bottom:8px;}

/* ══════════════════════════════════════
   BOTTOM NAV / CTRL
══════════════════════════════════════ */
.bottom-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(19,22,28,0.96);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:10px 20px 14px;
  display:flex;gap:8px;
  z-index:200;
}
.bb-btn{
  flex:1;padding:11px 8px;border-radius:14px;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  border:1.5px solid var(--border2);background:var(--surface2);
  color:var(--txt2);transition:all 0.2s;
}
.bb-btn:active{transform:scale(0.96);}
.bb-btn.green{border-color:rgba(0,230,118,0.4);color:var(--green);}
.bb-btn.blue{border-color:rgba(0,194,255,0.35);color:var(--accent);}
.bb-btn.red{border-color:rgba(255,59,92,0.35);color:var(--danger);}

/* ══════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}
.hero{animation:fadeUp 0.4s ease 0.05s both;}
.progress-card{animation:fadeUp 0.4s ease 0.1s both;}
.stats-row{animation:fadeUp 0.4s ease 0.18s both;}
.section-card{animation:fadeUp 0.4s ease 0.26s both;}
.section-card:nth-child(4){animation-delay:0.32s;}

/* ══════════════════════════════════════
   SCROLLBAR oculta globalmente
══════════════════════════════════════ */
html{scrollbar-width:none;}
html::-webkit-scrollbar{display:none;}
</style>
</head>
<body>

<!-- ══ INTRO ══ -->
<div id="intro">
  <div class="intro-ring">
    <svg viewBox="0 0 120 120">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00C2FF"/>
          <stop offset="100%" stop-color="#00FFD1"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="60" cy="60" r="54"/>
      <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="54"/>
    </svg>
    <div class="ring-pct">
      <div class="ring-num" id="load-pct">0%</div>
      <div class="ring-label">loading</div>
    </div>
  </div>
  <div class="intro-logo">LOOKMAXING</div>
  <div class="intro-tagline">seu progresso diário</div>
  <div class="load-status-txt" id="load-status">Inicializando...</div>
</div>

<!-- ══ BG ══ -->
<div id="bg-wrap">
  <div id="bg-img"></div>
  <video id="bg-video" loop playsinline></video>
</div>

<!-- ══ APP ══ -->
<div class="app" id="app">
  <div class="scroll-area">

    <!-- HERO -->
    <div class="hero">
      <div class="hero-bg"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-date" id="hero-date">—</div>
        <div class="hero-title">LOOKMAXING</div>
        <div class="hero-sub" id="hero-sub">carregando...</div>
      </div>
    </div>

    <div class="cards">

      <!-- PROGRESS CARD -->
      <div class="progress-card">
        <div class="progress-card-top">
          <div class="progress-card-label">Progresso de hoje</div>
          <div class="progress-pct-badge" id="pct-badge">0%</div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-foot">
          <div class="progress-foot-txt" id="pct-label">0% concluído</div>
          <div class="progress-foot-tasks" id="tasks-count">0 / 0 tarefas</div>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-card accent">
          <div class="stat-icon-row">
            <div class="stat-icon">📅</div>
            <div class="stat-label">No lookmax</div>
          </div>
          <div class="stat-value" id="stat-dias">0</div>
          <div class="stat-sub" id="stat-inicio">desde o início</div>
        </div>
        <div class="stat-card fire-card">
          <div class="stat-icon-row">
            <div class="stat-icon">🔥</div>
            <div class="stat-label">Streak</div>
          </div>
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-sub" id="stat-streak-sub">dias seguidos</div>
        </div>
      </div>

      <!-- WEEKLY CALENDAR -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-title"><span>📆</span> Semana atual</div>
          <div class="section-badge" id="week-badge">—</div>
        </div>
        <div class="week-grid" id="week-grid"></div>
        <div class="fires-row" id="fires-row"></div>
      </div>

      <!-- TASKS -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-title"><span>🎯</span> Rotina diária</div>
          <div class="section-badge" id="tasks-badge">0/0</div>
        </div>
        <div class="add-row">
          <input class="add-input" type="text" id="nova-tarefa"
            placeholder="Adicionar rotina..."
            onkeydown="if(event.key==='Enter') addTask()">
          <button class="add-btn" onclick="addTask()">+</button>
        </div>
        <div id="lista"></div>
      </div>

    </div><!-- /cards -->
  </div><!-- /scroll-area -->

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="bb-btn green" id="btn-play" onclick="toggleVideo()">▶ Vídeo</button>
    <button class="bb-btn blue"  id="btn-bg"   onclick="toggleBg()">🖼 Fundo</button>
    <button class="bb-btn red"   onclick="resetStart()">⟳ Reset</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   INTRO LOADING
══════════════════════════════════════ */
const CIRCUMFERENCE = 2 * Math.PI * 54; // ≈ 339.3
document.querySelector('.ring-fill').style.strokeDasharray = CIRCUMFERENCE;
document.querySelector('.ring-fill').style.strokeDashoffset = CIRCUMFERENCE;

const STEPS = [
  [10,  "Inicializando sistema..."],
  [25,  "Carregando perfil..."],
  [42,  "Lendo histórico de check-ins..."],
  [60,  "Calculando streak 🔥"],
  [75,  "Sincronizando rotinas..."],
  [90,  "Preparando interface..."],
  [100, "Pronto. Bora! 💪"],
];
let lpct = 0, lstep = 0;
const ringFill  = document.querySelector('.ring-fill');
const loadPctEl = document.getElementById('load-pct');
const loadStatEl= document.getElementById('load-status');

function runIntro(){
  const iv = setInterval(()=>{
    if(lstep < STEPS.length && lpct >= STEPS[lstep][0]-1){
      loadStatEl.textContent = STEPS[lstep][1]; lstep++;
    }
    if(lpct < 100){
      lpct++;
      const offset = CIRCUMFERENCE - (lpct/100)*CIRCUMFERENCE;
      ringFill.style.strokeDashoffset = offset;
      loadPctEl.textContent = lpct + '%';
    } else {
      clearInterval(iv);
      setTimeout(()=>{
        document.getElementById('intro').classList.add('hide');
        document.getElementById('app').classList.add('visible');
      }, 700);
    }
  }, 24);
}
window.addEventListener('load', runIntro);

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
const dateKey = d => d.toISOString().slice(0,10);
const today   = () => dateKey(new Date());
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };

function getMon(d){
  const day=d.getDay();
  const diff=(day===0)?-6:1-day;
  const m=new Date(d); m.setDate(d.getDate()+diff); return m;
}

/* ══════════════════════════════════════
   STORAGE
══════════════════════════════════════ */
const ld = (k,def) => { try{ const v=localStorage.getItem(k); return v!==null?JSON.parse(v):def; }catch(e){return def;} };
const sv = (k,v)   => localStorage.setItem(k,JSON.stringify(v));

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let tarefas   = ld('lm_tarefas', []);
let checks    = ld('lm_checks',  {});
let fullDays  = ld('lm_full',    []);
let startDate = ld('lm_start',   null);
if(!startDate){ startDate=today(); sv('lm_start',startDate); }

const save = () => { sv('lm_tarefas',tarefas); sv('lm_checks',checks); sv('lm_full',fullDays); };

/* ══════════════════════════════════════
   TAREFAS
══════════════════════════════════════ */
function addTask(){
  const el = document.getElementById('nova-tarefa');
  const v  = el.value.trim();
  if(!v) return;
  tarefas.push(v); el.value='';
  save(); render();
}
function remover(i){ tarefas.splice(i,1); save(); render(); }
function toggle(i){
  const tk=today();
  if(!checks[tk]) checks[tk]={};
  checks[tk][i]=!checks[tk][i];
  save(); render();
}

/* ══════════════════════════════════════
   STREAK
══════════════════════════════════════ */
function calcStreak(){
  if(!fullDays.length) return 0;
  const set = new Set(fullDays);
  const tk  = today();
  const yk  = dateKey(addDays(new Date(),-1));
  let cur   = set.has(tk) ? new Date() : set.has(yk) ? addDays(new Date(),-1) : null;
  if(!cur) return 0;
  let s=0;
  while(set.has(dateKey(cur))){ s++; cur=addDays(cur,-1); }
  return s;
}

/* ══════════════════════════════════════
   RENDER SEMANA
══════════════════════════════════════ */
const DNAMES = ['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];

function renderWeek(){
  const grid   = document.getElementById('week-grid');
  const fires  = document.getElementById('fires-row');
  const wBadge = document.getElementById('week-badge');
  grid.innerHTML=''; fires.innerHTML='';

  const now = new Date();
  const tk  = today();
  const mon = getMon(now);

  let weekDone=0;
  for(let i=0;i<7;i++){
    const d  = addDays(mon,i);
    const dk = dateKey(d);
    const isToday    = dk===tk;
    const isFuture   = d>now && !isToday;
    const isComplete = fullDays.includes(dk);
    const dc = checks[dk]||{};
    const done= Object.values(dc).filter(Boolean).length;
    const isPartial  = done>0 && !isComplete && !isFuture;
    if(isComplete) weekDone++;

    let cls='day-bubble'; let inner='';
    if(isComplete){      cls+=' complete'; inner='🔥'; }
    else if(isPartial){  cls+=' partial';  inner='⚡'; }
    else if(isFuture){   cls+=' future';   inner=`<span class="day-num">${d.getDate()}</span>`; }
    else{                cls+=(isToday?' today':' empty'); inner=`<span class="day-num">${d.getDate()}</span>`; }

    const col=document.createElement('div');
    col.className='day-col';
    col.innerHTML=`<div class="day-lbl">${DNAMES[i]}</div><div class="${cls}">${inner}</div>`;
    grid.appendChild(col);
  }
  wBadge.textContent = weekDone+'/7';

  // fires row
  const streak=calcStreak();
  const lbl=document.createElement('span');
  lbl.className='fires-label'; lbl.textContent='Streak';
  fires.appendChild(lbl);
  for(let i=0;i<7;i++){
    const f=document.createElement('span');
    f.className='fire-dot'+(i<streak?' on':'');
    f.textContent='🔥';
    fires.appendChild(f);
  }
}

/* ══════════════════════════════════════
   RENDER PRINCIPAL
══════════════════════════════════════ */
function render(){
  const now=new Date();
  const tk=today();
  if(!checks[tk]) checks[tk]={};

  /* hero date */
  const dStr=now.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('hero-date').textContent=dStr.charAt(0).toUpperCase()+dStr.slice(1);

  /* lista tarefas */
  const lista=document.getElementById('lista');
  lista.innerHTML='';
  let feitos=0;

  if(tarefas.length===0){
    lista.innerHTML=`<div class="empty-state"><div>📋</div>Nenhuma rotina ainda.<br>Adicione sua primeira tarefa!</div>`;
  } else {
    tarefas.forEach((t,i)=>{
      const feito=!!checks[tk][i];
      if(feito) feitos++;
      const div=document.createElement('div');
      div.className='task-item'+(feito?' done':'');
      div.innerHTML=`
        <div class="task-check" onclick="toggle(${i})">
          <span class="task-check-icon">✓</span>
        </div>
        <span class="task-name">${t}</span>
        <button class="task-del" onclick="remover(${i})">✕</button>`;
      lista.appendChild(div);
    });
  }

  const total=tarefas.length;
  const pct=total?Math.round((feitos/total)*100):0;

  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('pct-badge').textContent=pct+'%';
  document.getElementById('pct-label').textContent=pct+'% concluído';
  document.getElementById('tasks-count').textContent=feitos+' / '+total+' tarefas';
  document.getElementById('tasks-badge').textContent=feitos+'/'+total;

  /* hero sub */
  const msgs=['Bora maxxar hoje! 💪','Consistência é tudo 🎯','Você tá crescendo 📈','Não pare agora! 🔥'];
  document.getElementById('hero-sub').textContent=msgs[Math.floor(Math.random()*msgs.length)];

  /* fullDays */
  if(total>0 && feitos===total){
    if(!fullDays.includes(tk)){ fullDays.push(tk); save(); }
  } else {
    const idx=fullDays.indexOf(tk);
    if(idx>-1){ fullDays.splice(idx,1); save(); }
  }

  /* stats */
  const start=new Date(startDate+'T00:00:00');
  const dias=Math.max(1,Math.floor((now-start)/86400000)+1);
  document.getElementById('stat-dias').textContent=dias;
  document.getElementById('stat-inicio').textContent=
    'desde '+start.toLocaleDateString('pt-BR',{day:'numeric',month:'short'});

  const streak=calcStreak();
  document.getElementById('stat-streak').textContent=streak;
  document.getElementById('stat-streak-sub').textContent=
    streak===0?'comece hoje!':streak===1?'1 dia seguido':streak+' dias seguidos';

  renderWeek();
}

/* ══════════════════════════════════════
   RESET
══════════════════════════════════════ */
function resetStart(){
  if(confirm('Resetar a data de início do lookmaxxing para hoje?')){
    startDate=today(); sv('lm_start',startDate); render();
  }
}

/* ══════════════════════════════════════
   BG / VIDEO
══════════════════════════════════════ */
let bgMode='image', videoPlaying=false;
const vid     = document.getElementById('bg-video');
const bgImgEl = document.getElementById('bg-img');

function toggleVideo(){
  const btn=document.getElementById('btn-play');
  if(!videoPlaying){
    vid.play().then(()=>{ videoPlaying=true; btn.textContent='⏸ Pausar'; })
              .catch(()=>{ btn.textContent='❌ Erro'; });
  } else {
    vid.pause(); videoPlaying=false; btn.textContent='▶ Vídeo';
  }
}
function toggleBg(){
  const btn=document.getElementById('btn-bg');
  if(bgMode==='image'){
    bgMode='video'; bgImgEl.style.display='none';
    vid.style.display='block'; btn.textContent='📷 Vídeo';
    vid.play().then(()=>{ videoPlaying=true; document.getElementById('btn-play').textContent='⏸ Pausar'; }).catch(()=>{});
  } else {
    bgMode='image'; bgImgEl.style.display='block';
    vid.style.display='none'; vid.pause(); videoPlaying=false;
    document.getElementById('btn-play').textContent='▶ Vídeo';
    btn.textContent='🖼 Fundo';
  }
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
render();
</script>
