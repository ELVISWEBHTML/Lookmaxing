<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOKMAXING</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

#bg-video {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -2;
}

body{
    min-height: 100vh;
    color:white;
    display:flex;
    justify-content:center;
    padding:20px;
    position: relative;
    overflow-x: hidden;
}



body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: -1;
}

.app{
    width:100%;
    max-width:480px;
    z-index: 1;
}

.header{
    margin-bottom:24px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
}

.header h1{
    font-size:28px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #fff, #00bfff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom:6px;
}

.data{
    color:#aaa;
    font-size:13px;
    letter-spacing: 1px;
    margin-bottom: 12px;
}

.progress-container{
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    height:10px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ff88,#00bfff);
    transition:width 0.4s ease;
    border-radius:20px;
}

.percent{
    margin-top:8px;
    font-size:13px;
    color:#00ff88;
    letter-spacing: 1px;
}

.add-box{
    margin:16px 0;
    display:flex;
    gap:8px;
}

.add-box input{
    flex:1;
    padding:12px 16px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius:12px;
    outline:none;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(8px);
    color: white;
    font-size: 14px;
}

.add-box input::placeholder { color: rgba(255,255,255,0.4); }

.add-box button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg,#00bfff,#0077cc);
    color:white;
    cursor:pointer;
    font-weight:bold;
    font-size: 20px;
    line-height: 1;
    transition: opacity 0.2s;
}

.add-box button:hover { opacity: 0.85; }

.task{
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.09);
    padding:14px 16px;
    border-radius:14px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition: opacity 0.2s, transform 0.2s;
}

.task:hover { transform: translateX(2px); }

.task.done{
    opacity:0.5;
}

.task.done span {
    text-decoration: line-through;
}

.task-left{
    display:flex;
    align-items:center;
    gap:12px;
    font-size: 15px;
}

.task input[type=checkbox]{
    width:18px;
    height:18px;
    accent-color: #00bfff;
    cursor: pointer;
}

.remove{
    background:none;
    border:none;
    color:rgba(255,100,100,0.7);
    font-size:16px;
    cursor:pointer;
    transition: color 0.2s;
}

.remove:hover { color: #ff4d4d; }
</style>
</head>

<body>

<video id="bg-video" autoplay loop playsinline>
    <source src="video.mp4" type="video/mp4">
</video>

<div class="app">

    <div class="header">
        <h1>LOOKMAXING</h1>
        <div class="data" id="data"></div>

        <div class="progress-container">
            <div class="progress" id="progress"></div>
        </div>
        <div class="percent" id="percent"></div>
    </div>

    <div class="add-box">
        <input type="text" id="novaTarefa" placeholder="Adicionar nova rotina diária..." onkeydown="if(event.key==='Enter') addTask()">
        <button onclick="addTask()">+</button>
    </div>

    <div id="lista"></div>

</div>

<script>
const hoje = new Date().toLocaleDateString();
document.getElementById("data").innerText = hoje;

let tarefas = JSON.parse(localStorage.getItem("tarefas")) || [];
let checks = JSON.parse(localStorage.getItem("checks")) || {};

function salvar(){
    localStorage.setItem("tarefas", JSON.stringify(tarefas));
    localStorage.setItem("checks", JSON.stringify(checks));
}

function addTask(){
    const nome = document.getElementById("novaTarefa").value.trim();
    if(!nome) return;
    tarefas.push(nome);
    document.getElementById("novaTarefa").value="";
    salvar();
    render();
}

function remover(index){
    tarefas.splice(index,1);
    salvar();
    render();
}

function toggle(index){
    const key = hoje+"-"+index;
    checks[key] = !checks[key];
    salvar();
    render();
}

function render(){
    const lista = document.getElementById("lista");
    lista.innerHTML="";
    let feitos=0;

    tarefas.forEach((tarefa,index)=>{
        const key = hoje+"-"+index;
        const feito = checks[key];

        if(feito) feitos++;

        const div = document.createElement("div");
        div.className="task"+(feito?" done":"");

        div.innerHTML=`
            <div class="task-left">
                <input type="checkbox" ${feito?"checked":""} onclick="toggle(${index})">
                <span>${tarefa}</span>
            </div>
            <button class="remove" onclick="remover(${index})">✕</button>
        `;

        lista.appendChild(div);
    });

    const total = tarefas.length;
    const percent = total? Math.round((feitos/total)*100):0;

    document.getElementById("progress").style.width=percent+"%";
    document.getElementById("percent").innerText=percent+"% concluído hoje";
}

render();
</script>

</body>
</html>
